<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Мої Комунальні</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: { 850: '#1f1f22' }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --color-primary: #10b981;
            --color-primary-hover: #059669;
            --color-primary-light: #d1fae5;
        }
        .dark {
            --color-primary-light: rgba(16, 185, 129, 0.2);
        }
        
        .text-primary { color: var(--color-primary); }
        .bg-primary { background-color: var(--color-primary); }
        .bg-primary-hover:hover { background-color: var(--color-primary-hover); }
        .bg-primary-light { background-color: var(--color-primary-light); }
        .border-primary { border-color: var(--color-primary); }
        .ring-primary { --tw-ring-color: var(--color-primary); }
        .peer:checked ~ .peer-checked\:bg-primary { background-color: var(--color-primary); }
        
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        /* Приховати стрілочки в інпутах типу number */
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        /* Плавні переходи */
        .btn-press:active { transform: scale(0.96); transition: transform 0.1s; }
        .glass-nav { @apply bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border-t border-zinc-200 dark:border-zinc-800 transition-colors duration-300; }
        .glass-header { @apply bg-zinc-50/80 dark:bg-zinc-900/80 backdrop-blur-xl border-b border-zinc-200 dark:border-zinc-800 transition-colors duration-300; }
        .card { @apply bg-white dark:bg-zinc-850 rounded-[1.5rem] p-5 shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-zinc-100 dark:border-zinc-800 transition-all duration-300; }
        .input-style { @apply w-full px-4 py-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:text-zinc-100 transition-all duration-300; }
        
        /* Скролбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { @apply bg-zinc-300 dark:bg-zinc-700 rounded-full; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen pb-24 transition-colors duration-300">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center pointer-events-none w-[90%] max-w-sm gap-2"></div>

    <!-- Auth Screen -->
    <div id="authScreen" class="fixed inset-0 bg-zinc-100 dark:bg-zinc-900 z-50 flex items-center justify-center p-6 transition-colors duration-300">
        <div class="bg-white dark:bg-zinc-850 rounded-[2rem] p-8 w-full max-w-sm shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-zinc-200 dark:border-zinc-800">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-zinc-900 dark:text-white">Вхід</h2>
                <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-2">Твої Комунальні</p>
            </div>
            
            <div class="space-y-4 mb-8">
                <div>
                    <input type="text" id="loginPhone" placeholder="Логін або телефон" class="w-full px-5 py-4 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:text-zinc-100 transition-all text-lg" autocomplete="username">
                </div>
                <div>
                    <input type="password" id="loginPass" placeholder="Пароль" class="w-full px-5 py-4 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:text-zinc-100 transition-all text-lg" autocomplete="current-password">
                </div>
            </div>
            
            <button onclick="login()" class="w-full bg-primary hover:bg-primary-hover text-white py-4 rounded-2xl font-bold btn-press text-lg shadow-lg shadow-primary/30">Увійти</button>
        </div>
    </div>

    <!-- Header (Glassmorphism) -->
    <header class="fixed top-0 w-full z-40 glass-header px-4 py-3 flex justify-between items-center">
        <div>
            <p class="text-xs font-semibold text-primary uppercase tracking-wider mb-0.5">Об'єкт</p>
            <select id="addressSelect" onchange="changeAddress(this.value)" class="bg-transparent text-lg font-bold outline-none dark:text-zinc-100 appearance-none border-none pr-4 cursor-pointer">
                <option value="default">Мій дім</option>
            </select>
        </div>
        <button onclick="shareAddressAccess()" class="btn-press bg-primary/10 text-primary p-2.5 rounded-full" id="shareBtn" aria-label="Поділитися">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
        </button>
    </header>

    <!-- Main Content -->
    <div class="pt-20 px-4 max-w-lg mx-auto" id="appContent">
        
        <!-- Tab: Калькулятор -->
        <div id="tab-calc" class="space-y-4">
            <div class="card p-2 flex justify-between items-center mb-6 overflow-x-auto gap-2 scrollbar-hide">
                <button class="px-5 py-2.5 rounded-xl font-medium whitespace-nowrap bg-primary text-white" id="monthSelectorBtn" onclick="toggleMonthSelector()">Оберіть місяць</button>
            </div>
            
            <div class="card space-y-4">
                <h3 class="font-bold text-lg mb-2 flex items-center gap-2"><svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Електроенергія</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="elPrev" placeholder="Попередні" class="input-style" inputmode="decimal">
                    <input type="number" id="elCurr" placeholder="Поточні" class="input-style" inputmode="decimal">
                </div>
                <!-- Знижка опалення -->
                <div class="flex items-center justify-between p-3 bg-zinc-50 dark:bg-zinc-900 rounded-xl mt-3">
                    <span class="text-sm font-medium">Зимова знижка</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="winterDiscount" class="sr-only peer" onchange="hapticClick()">
                        <div class="w-11 h-6 bg-zinc-200 dark:bg-zinc-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>
                <!-- Нічний тариф -->
                <div class="flex items-center justify-between p-3 bg-zinc-50 dark:bg-zinc-900 rounded-xl">
                    <span class="text-sm font-medium">Нічний тариф</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="nightTariff" onchange="toggleNightInputs(); hapticClick()" class="sr-only peer">
                        <div class="w-11 h-6 bg-zinc-200 dark:bg-zinc-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>
                <div id="nightInputs" class="hidden grid grid-cols-2 gap-3 mt-3">
                    <input type="number" id="elPrevNight" placeholder="Ніч Попередні" class="input-style" inputmode="decimal">
                    <input type="number" id="elCurrNight" placeholder="Ніч Поточні" class="input-style" inputmode="decimal">
                </div>
            </div>

            <div class="card space-y-3">
                <h3 class="font-bold text-lg mb-2 flex items-center gap-2"><svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg> Вода</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="waterPrev" placeholder="Попередні" class="input-style" inputmode="decimal">
                    <input type="number" id="waterCurr" placeholder="Поточні" class="input-style" inputmode="decimal">
                </div>
            </div>

            <div class="card space-y-3">
                <h3 class="font-bold text-lg mb-2">Фіксовані послуги</h3>
                <div id="customServicesListCalc" class="space-y-2"></div>
            </div>

            <div class="card bg-zinc-900 dark:bg-zinc-800 text-white">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-zinc-400">Всього до сплати</span>
                    <span class="text-3xl font-bold" id="totalSum">0.00 ₴</span>
                </div>
                <button onclick="calculate()" class="w-full bg-primary hover:bg-primary-hover text-white py-4 rounded-xl font-bold text-lg btn-press mb-3">Розрахувати</button>
                <button onclick="saveData()" class="w-full bg-white/10 hover:bg-white/20 text-white py-3 rounded-xl font-medium btn-press">Зберегти місяць</button>
            </div>
            
            <!-- Модалка вибору місяця -->
            <div id="monthSelectorModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
                <div class="bg-white dark:bg-zinc-850 rounded-3xl p-6 w-full max-w-xs shadow-xl scale-100 transition-transform">
                    <h3 class="text-xl font-bold mb-4 text-center">Виберіть місяць</h3>
                    <div class="grid grid-cols-3 gap-2" id="monthGrid"></div>
                    <button onclick="toggleMonthSelector()" class="mt-6 w-full py-3 bg-zinc-100 dark:bg-zinc-800 rounded-xl font-medium btn-press">Скасувати</button>
                </div>
            </div>
        </div>

        <!-- Tab: Історія -->
        <div id="tab-records" class="hidden space-y-4">
            <div id="recordsList" class="space-y-4"></div>
            <div class="card text-center mt-6">
                <button onclick="exportToCSV()" class="btn-press flex items-center justify-center gap-2 w-full text-primary font-medium py-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Завантажити CSV (Excel)
                </button>
            </div>
        </div>

        <!-- Tab: Налаштування -->
        <div id="tab-settings" class="hidden space-y-5">
            
            <div class="card space-y-4">
                <h3 class="font-bold text-lg border-b border-zinc-100 dark:border-zinc-800 pb-2">Управління об'єктами</h3>
                <div id="addressesList" class="space-y-2"></div>
                <div class="flex gap-2">
                    <input type="text" id="newAddressName" placeholder="Назва (напр. Квартира 2)" class="input-style flex-1">
                    <button onclick="addNewAddress()" class="bg-zinc-900 dark:bg-zinc-700 text-white px-5 rounded-xl font-medium btn-press">Додати</button>
                </div>
            </div>

            <div class="card space-y-4">
                <h3 class="font-bold text-lg border-b border-zinc-100 dark:border-zinc-800 pb-2">Зовнішній вигляд</h3>
                
                <div class="flex items-center justify-between">
                    <span class="font-medium">Тема</span>
                    <select id="themeModeSelect" onchange="changeThemeMode(this.value)" class="bg-zinc-100 dark:bg-zinc-800 px-3 py-2 rounded-lg font-medium outline-none">
                        <option value="light">Світла</option>
                        <option value="dark">Темна</option>
                        <option value="auto">Авто (Система)</option>
                    </select>
                </div>
                
                <div>
                    <span class="font-medium block mb-3">Колірний акцент</span>
                    <div class="flex gap-4" id="colorPickerList">
                        <button onclick="changePrimaryColor('emerald', '#10b981', '#059669', '#d1fae5')" class="w-10 h-10 rounded-full bg-emerald-500 ring-2 ring-offset-2 ring-emerald-500 dark:ring-offset-zinc-850 btn-press transition-all"></button>
                        <button onclick="changePrimaryColor('rose', '#f43f5e', '#e11d48', '#ffe4e6')" class="w-10 h-10 rounded-full bg-rose-500 btn-press transition-all"></button>
                        <button onclick="changePrimaryColor('blue', '#3b82f6', '#2563eb', '#dbeafe')" class="w-10 h-10 rounded-full bg-blue-500 btn-press transition-all"></button>
                        <button onclick="changePrimaryColor('violet', '#8b5cf6', '#7c3aed', '#ede9fe')" class="w-10 h-10 rounded-full bg-violet-500 btn-press transition-all"></button>
                        <button onclick="changePrimaryColor('zinc', '#71717a', '#52525b', '#f4f4f5')" class="w-10 h-10 rounded-full bg-zinc-500 btn-press transition-all"></button>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <span class="font-medium">Вібрація (Haptic)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="vibrationToggle" onchange="toggleVibration()" class="sr-only peer">
                        <div class="w-11 h-6 bg-zinc-200 dark:bg-zinc-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>
            </div>

            <div class="card space-y-4">
                <h3 class="font-bold text-lg border-b border-zinc-100 dark:border-zinc-800 pb-2">Тарифи</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-zinc-500 ml-1">Світло (День)</label>
                        <input type="number" id="tEl" class="input-style py-2" inputmode="decimal">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-500 ml-1">Світло (Ніч)</label>
                        <input type="number" id="tElN" class="input-style py-2" inputmode="decimal">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-500 ml-1">Світло (Зима)</label>
                        <input type="number" id="tElW" class="input-style py-2" inputmode="decimal">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-500 ml-1">Вода</label>
                        <input type="number" id="tWat" class="input-style py-2" inputmode="decimal">
                    </div>
                </div>
                <button onclick="saveTariffs()" class="w-full bg-primary hover:bg-primary-hover text-white py-3 rounded-xl font-medium btn-press mt-2">Зберегти тарифи</button>
            </div>

            <div class="card space-y-4">
                <h3 class="font-bold text-lg border-b border-zinc-100 dark:border-zinc-800 pb-2">Свої послуги (фіксовані)</h3>
                <div id="customServicesSettingsList" class="space-y-3"></div>
                <div class="flex gap-2 pt-2">
                    <input type="text" id="newServName" placeholder="Назва" class="input-style py-2 flex-1">
                    <input type="number" id="newServPrice" placeholder="Ціна" class="input-style py-2 w-24" inputmode="decimal">
                    <button onclick="addCustomService()" class="bg-zinc-900 dark:bg-zinc-700 text-white px-4 rounded-xl font-medium btn-press">+</button>
                </div>
            </div>

            <button onclick="logout()" class="w-full bg-red-100 dark:bg-red-500/20 text-red-600 dark:text-red-400 py-3 rounded-xl font-bold btn-press">Вийти з акаунта</button>
        </div>
    </div>

    <!-- Bottom Navigation (Glassmorphism) -->
    <nav class="fixed bottom-0 w-full glass-nav px-6 py-4 flex justify-between z-40 pb-[calc(1rem+env(safe-area-inset-bottom))]">
        <button onclick="switchTab('calc')" id="nav-calc" class="flex flex-col items-center gap-1 text-primary btn-press">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-medium">Розрахунок</span>
        </button>
        <button onclick="switchTab('records')" id="nav-records" class="flex flex-col items-center gap-1 text-zinc-400 dark:text-zinc-500 hover:text-primary transition-colors btn-press">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <span class="text-[10px] font-medium">Історія</span>
        </button>
        <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center gap-1 text-zinc-400 dark:text-zinc-500 hover:text-primary transition-colors btn-press">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-medium">Налашт.</span>
        </button>
    </nav>

    <script>
        const CF_WORKER_URL = 'https://komunproga.mikolenko-anton1.workers.dev/';
        const monthsUa = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
        
        let addresses = [];
        let currentAddressId = 'default';
        let selMonthIdx = new Date().getMonth();
        let phone = localStorage.getItem('komun_phone') || '';
        let pass = localStorage.getItem('komun_pass') || '';
        let sharedToken = new URLSearchParams(window.location.search).get('share');

        const defaultTariffs = { el: 4.32, elNight: 2.16, elWinter: 2.64, water: 45.00 };
        const defaultPrefs = { winter: false, night: false, vibration: true, themeMode: 'auto', themeName: 'emerald', themeColors: ['#10b981', '#059669', '#d1fae5'] };
        const defaultCustomServices = [
            { id: 1, name: 'Утримання будинку', price: 200, active: true },
            { id: 2, name: 'Вивіз сміття', price: 40, active: true }
        ];

        /* --- UI & Theming Functions --- */
        function hapticClick(type = 'soft') {
            const currentAd = addresses.find(a => a.id === currentAddressId);
            if (currentAd && currentAd.prefs.vibration && navigator.vibrate) {
                navigator.vibrate(type === 'heavy' ? [50, 50, 50] : 40);
            }
        }

        function showToast(message, type = 'success') {
            hapticClick(type === 'error' ? 'heavy' : 'soft');
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `transform transition-all duration-300 -translate-y-[150%] opacity-0 flex items-center gap-3 px-5 py-3.5 rounded-[1.2rem] shadow-xl border backdrop-blur-xl ${type === 'error' ? 'bg-red-500/90 border-red-600 text-white' : 'bg-zinc-800/95 border-zinc-700 text-white dark:bg-zinc-100/95 dark:border-zinc-200 dark:text-zinc-900'} w-full`;
            toast.innerHTML = `
                ${type === 'success' ? '<svg class="w-5 h-5 text-green-400 dark:text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : '<svg class="w-5 h-5 text-red-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>'}
                <span class="font-medium text-sm">${message}</span>
            `;

        function applyThemeMode(mode) {
            const isDark = mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('themeModeSelect').value = mode;
            
            let metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if(!metaThemeColor) {
                metaThemeColor = document.createElement('meta');
                metaThemeColor.name = "theme-color";
                document.head.appendChild(metaThemeColor);
            }
            metaThemeColor.content = isDark ? "#18181b" : "#fafafa";
        }

        function changePrimaryColor(name, main, hover, light) {
            hapticClick();
            const currentAd = addresses.find(a => a.id === currentAddressId);
            if(currentAd) {
                currentAd.prefs.themeName = name;
                currentAd.prefs.themeColors = [main, hover, light];
            }
            applyPrimaryColor(name, main, hover, light);
            if(currentAd) bgSave();
        }

        function applyPrimaryColor(name, main, hover, light) {
            document.documentElement.style.setProperty('--color-primary', main);
            document.documentElement.style.setProperty('--color-primary-hover', hover);
            document.documentElement.style.setProperty('--color-primary-light', light);
            
            const buttons = document.getElementById('colorPickerList').children;
            for(let btn of buttons) {
                if(btn.className.includes(name)) {
                    btn.classList.add('ring-2', 'ring-offset-2');
                    btn.classList.replace('ring-transparent', `ring-${name}-500`);
                } else {
                    btn.classList.remove('ring-2', 'ring-offset-2');
                    btn.className = btn.className.replace(/ring-[a-z]+-500/g, 'ring-transparent');
                }
            }
        }

        async function fetchData(token = null, isShared = false) {
            try {
                const url = isShared ? `${CF_WORKER_URL}?share=${token}` : `${CF_WORKER_URL}?phone=${encodeURIComponent(phone)}&pass=${encodeURIComponent(pass)}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.success) {
                    if (isShared && data.data && typeof data.data === 'object' && !Array.isArray(data.data.addresses)) {
                        addresses = [{ id: 'shared_1', name: data.data.name || 'Спільний об\'єкт', tariffs: data.data.tariffs || {...defaultTariffs}, prefs: {...defaultPrefs, ...(data.data.prefs || {})}, records: data.data.records || [], customServices: data.data.customServices || [...defaultCustomServices] }];
                        currentAddressId = 'shared_1';
                        document.getElementById('shareBtn').classList.add('hidden');
                        document.getElementById('nav-settings').classList.add('hidden');
                    } else if (data.data && data.data.addresses) {
                        addresses = data.data.addresses;
                        currentAddressId = addresses[0]?.id || 'default';
                    } else {
                        addresses = [{ id: 'default', name: 'Мій дім', tariffs: data.data?.tariffs || {...defaultTariffs}, prefs: {...defaultPrefs, ...(data.data?.prefs || {})}, records: data.data?.records || [], customServices: data.data?.customServices || [...defaultCustomServices] }];
                        currentAddressId = 'default';
                    }
                    
                    document.getElementById('authScreen').classList.add('hidden');
                    loadCurrentAddress();
                    showToast('Вхід успішний');
                } else throw new Error();
            } catch (err) {
                document.getElementById('authScreen').classList.remove('hidden');
                document.querySelector('#authScreen button').innerHTML = 'Увійти';
                if (!isShared) { localStorage.clear(); phone = ''; pass = ''; }
                showToast('Помилка входу', 'error');
            }
        }

        async function saveData(silent = false) {
            if (!sharedToken && (!phone || !pass)) return;
            const btn = document.querySelector('#tab-calc button.bg-white\\/10');
            const oldHtml = btn.innerHTML;
            
            if(!silent) {
                hapticClick();
                btn.innerHTML = `<svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            }

            try {
                const url = sharedToken ? `${CF_WORKER_URL}?share=${sharedToken}` : `${CF_WORKER_URL}?phone=${encodeURIComponent(phone)}&pass=${encodeURIComponent(pass)}`;
                const payload = sharedToken ? { addresses: [addresses[0]] } : { addresses: addresses };
                
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(!silent) showToast('Місяць збережено');
                renderRecords();
            } catch (err) {
                if(!silent) showToast('Помилка збереження', 'error');
            }
            if(!silent) btn.innerHTML = oldHtml;
        }

            document.getElementById('vibrationToggle').checked = prefs.vibration;
            document.getElementById('winterDiscount').checked = prefs.winter;
            document.getElementById('nightTariff').checked = prefs.night;
            
            document.getElementById('tEl').value = currentAd.tariffs.el;
            document.getElementById('tElN').value = currentAd.tariffs.elNight;
            document.getElementById('tElW').value = currentAd.tariffs.elWinter;
            document.getElementById('tWat').value = currentAd.tariffs.water;

            renderAddressSelect();

            if (lastRec) {

                document.getElementById('elCurr').value = lastRec.elC;
                document.getElementById('elPrevNight').value = lastRec.elPN || '';
                document.getElementById('elCurrNight').value = lastRec.elCN || '';
                document.getElementById('waterPrev').value = lastRec.watP;
                document.getElementById('waterCurr').value = lastRec.watC;
                
                currentAd.customServices.forEach(s => {
                    if (lastRec.customData && lastRec.customData[s.id] !== undefined) {
                        const toggle = document.getElementById(`cs_calc_${s.id}`);
                        if (toggle) toggle.checked = lastRec.customData[s.id];
                    }
                });
            } else {
                ['elPrev', 'elCurr', 'elPrevNight', 'elCurrNight', 'waterPrev', 'waterCurr'].forEach(id => document.getElementById(id).value = '');
            }
            calculate(true);
        }

        /* --- Share Access Function --- */
        async function shareAddressAccess() {
            hapticClick();
            if (sharedToken || !phone || !pass) {
                showToast("Доступно тільки власнику", 'error');
                return;
            }
            const btn = document.getElementById('shareBtn');
            const oldHtml = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            
            try {
                const res = await fetch(`${CF_WORKER_URL}?phone=${encodeURIComponent(phone)}&pass=${encodeURIComponent(pass)}&generateShare=${currentAddressId}`);
                const data = await res.json();
                
                if (data.success && data.shareToken) {
                    const baseUrl = window.location.href.split('?')[0].replace(/#.*$/, '');
                    const link = `${baseUrl}?share=${data.shareToken}`;
                    
                    try {
                        await navigator.clipboard.writeText(link);
                        showToast("Посилання скопійовано!");
                    } catch (e) {
                        prompt("Посилання для гостя. Скопіюй його:", link);
                    }
                } else showToast("Помилка генерації", "error");
            } catch(e) { 
                showToast("Помилка з'єднання", "error"); 
            }
            btn.innerHTML = oldHtml;
        }

        function saveTariffs() {
            hapticClick();
            const currentAd = addresses.find(a => a.id === currentAddressId);
            if (!currentAd) return;
            currentAd.tariffs = {
                el: parseFloat(document.getElementById('tEl').value) || defaultTariffs.el,
                elNight: parseFloat(document.getElementById('tElN').value) || defaultTariffs.elNight,
                elWinter: parseFloat(document.getElementById('tElW').value) || defaultTariffs.elWinter,
                water: parseFloat(document.getElementById('tWat').value) || defaultTariffs.water
            };
            bgSave();

        function calculate(isSilent = false) {
            if(!isSilent) hapticClick();
            const currentAd = addresses.find(a => a.id === currentAddressId);
            if (!currentAd) return;
            
            const tariffs = currentAd.tariffs;
            const winter = document.getElementById('winterDiscount').checked;
            const night = document.getElementById('nightTariff').checked;
            
            currentAd.prefs.winter = winter;
            currentAd.prefs.night = night;

            let elP = parseFloat(document.getElementById('elPrev').value) || 0;
            let elC = parseFloat(document.getElementById('elCurr').value) || 0;
            let elPN = parseFloat(document.getElementById('elPrevNight').value) || 0;
            let elCN = parseFloat(document.getElementById('elCurrNight').value) || 0;
            
            let watP = parseFloat(document.getElementById('waterPrev').value) || 0;
            let watC = parseFloat(document.getElementById('waterCurr').value) || 0;

            let elDiff = Math.max(0, elC - elP);
            let elDiffNight = Math.max(0, elCN - elPN);
            let watDiff = Math.max(0, watC - watP);
            
            let elSum = 0;
            if (winter && elDiff <= 2000) {
                elSum = (night && elDiffNight > 0) 
                    ? ((elDiff - elDiffNight) * tariffs.elWinter) + (elDiffNight * (tariffs.elWinter / 2))
                    : (elDiff * tariffs.elWinter);
            } else {
                elSum = (night && elDiffNight > 0)
                    ? ((elDiff - elDiffNight) * tariffs.el) + (elDiffNight * tariffs.elNight)
                    : (elDiff * tariffs.el);
            }
            
            let watSum = watDiff * tariffs.water;
            
            let customSum = 0;
            let customData = {};
            currentAd.customServices.forEach(s => {
                const cb = document.getElementById(`cs_calc_${s.id}`);
                if (cb && cb.checked) {
                    customSum += s.price;
                    customData[s.id] = true;
                } else if (cb) {
                    customData[s.id] = false;
                }
            });

            const totalSum = elSum + watSum + customSum;
            document.getElementById('totalSum').innerText = `${totalSum.toFixed(2)} ₴`;

            if(!isSilent) {
                const rec = {
                    month: selMonthIdx,
                    elP, elC, elPN, elCN, watP, watC,
                    elSum, watSum, customSum, totalSum,
                    customData, isPaid: false
                };
                
                const idx = currentAd.records.findIndex(r => r.month === selMonthIdx);
                if (idx !== -1) currentAd.records[idx] = { ...currentAd.records[idx], ...rec };
                else currentAd.records.push(rec);
            }
        }

            const rec = currentAd.records.find(r => r.month === monthIdx);

        function deleteAddress(id) {
            hapticClick('heavy');
            if (addresses.length > 1 && confirm("Видалити цей об'єкт і всі його дані?")) {
                addresses = addresses.filter(a => a.id !== id);
                if (currentAddressId === id) currentAddressId = addresses[0].id;
                bgSave();
                renderAddressSelect();
                loadCurrentAddress();
            }
        }

        /* --- Export --- */
        function exportToCSV() {
            hapticClick();
            const currentAd = addresses.find(a => a.id === currentAddressId);
            if (!currentAd || !currentAd.records || currentAd.records.length === 0) return showToast("Немає даних", "error");
            
            let csv = "Місяць,Статус,Світло кВт,Світло Сума,Вода куб,Вода Сума,Інше Сума,Загальна Сума\n";
            currentAd.records.forEach(r => {
                csv += `${monthsUa[r.month]},${r.isPaid ? 'Оплачено' : 'Борг'},${r.elC - r.elP},${r.elSum.toFixed(2)},${r.watC - r.watP},${r.watSum.toFixed(2)},${r.customSum.toFixed(2)},${r.totalSum.toFixed(2)}\n`;
            });

            const blob = new Blob(["\uFEFF"+csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `komunalka_${currentAd.name}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
