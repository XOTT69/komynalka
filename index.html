<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мої Комунальні</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="theme-color" content="#f2f2f7" id="metaThemeColor">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta property="og:title" content="Комуналка — облік комунальних в телефоні">
    <meta property="og:description" content="Вносиш показники — бачиш скільки платити. Графіки, прогнози, нагадування.">
    <meta property="og:url" content="https://komynalka.vercel.app/">
    <meta name="description" content="Облік комунальних. Вода, світло, газ — вносиш показники, бачиш скільки платити.">
</head>
<body class="text-slate-800 dark:text-slate-200">

<!-- Splash -->
<div id="splashScreen" class="splash" aria-hidden="true">
    <div class="splash-content">
        <div class="splash-icon"><i class="fa-solid fa-bolt"></i></div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="polite" aria-atomic="true">
    <span id="toastIcon">✅</span><span id="toastMsg">OK</span>
</div>

<!-- =================== AUTH SCREEN =================== -->
<div id="authScreen" class="auth-screen" role="main" aria-label="Екран входу">
    <div class="auth-container">
        <!-- Hero -->
        <div class="auth-hero">
            <div class="auth-logo">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h1 class="auth-title">Комуналка<span class="text-brand">.</span></h1>
            <p class="auth-subtitle">Облік комунальних — просто і зрозуміло</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Auth error (global) -->
            <div id="authError" class="auth-error hidden" role="alert" aria-live="assertive"></div>

            <!-- Login form -->
            <form id="authForm" class="auth-form" novalidate>
                <div class="auth-field">
                    <label for="authLogin" class="auth-label">Логін</label>
                    <input
                        type="text" id="authLogin"
                        placeholder="Придумайте або введіть"
                        required autocapitalize="none" autocorrect="off" spellcheck="false"
                        class="auth-input"
                        aria-describedby="authLoginHint"
                    >
                    <p id="authLoginHint" class="auth-hint">Латиницею, без пробілів</p>
                </div>

                <div class="auth-field">
                    <label for="authPass" class="auth-label">Пароль</label>
                    <div class="auth-pass-wrap">
                        <input
                            type="password" id="authPass"
                            placeholder="Мінімум 4 символи"
                            required minlength="4"
                            class="auth-input auth-input-pass"
                            aria-describedby="authPassHint"
                        >
                        <button type="button" id="togglePassBtn" class="auth-eye" aria-label="Показати пароль">
                            <i id="passEyeIcon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <p id="authPassHint" class="auth-hint">Якщо логін новий — акаунт створюється автоматично</p>
                </div>

                <button type="submit" id="authSubmitBtn" class="auth-btn-primary" aria-busy="false">
                    <span id="authBtnText">Увійти</span>
                    <i id="authSpinner" class="fa-solid fa-spinner fa-spin hidden" aria-hidden="true"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider" aria-hidden="true">
                <span>або</span>
            </div>

            <!-- Google -->
            <button type="button" id="googleAuthBtn" class="auth-btn-google" aria-label="Вхід через Google">
                <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span>Увійти з Google</span>
            </button>

            <!-- Demo -->
            <button type="button" id="demoBtn" class="auth-btn-demo" aria-label="Подивитись демо">
                <i class="fa-solid fa-play"></i>
                <span>Демо без реєстрації</span>
            </button>
        </div>

        <!-- Features -->
        <div class="auth-features" aria-label="Можливості">
            <div class="auth-feature">
                <span>📊</span>
                <p>Графіки витрат</p>
            </div>
            <div class="auth-feature">
                <span>🔔</span>
                <p>Нагадування</p>
            </div>
            <div class="auth-feature">
                <span>☁️</span>
                <p>Хмарний бекап</p>
            </div>
            <div class="auth-feature">
                <span>🔒</span>
                <p>Шифрування</p>
            </div>
        </div>
    </div>
</div>

<!-- =================== APP SCREEN =================== -->
<div id="appScreen" class="app-screen hidden" role="main">
    <!-- Header -->
    <header class="app-header" role="banner">
        <div class="header-left" id="addressHeaderTrigger" role="button" tabindex="0" aria-label="Обрати адресу">
            <div class="header-icon"><i class="fa-solid fa-house"></i></div>
            <div>
                <p class="header-greeting" id="userGreeting">
                    Вітаю! <span id="syncDotHeader" class="sync-dot synced" aria-label="Синхронізовано"></span>
                </p>
                <h1 class="header-address">
                    <span id="currentAddressDisplay">Мій дім</span>
                    <i id="addressArrowIcon" class="fa-solid fa-chevron-down"></i>
                </h1>
            </div>
        </div>
        <button id="quickActionsBtn" class="header-actions-btn" aria-label="Додаткові дії">
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>
    </header>

    <!-- Content -->
    <div id="swipeContainer" class="app-content" role="tabpanel">
        <div class="content-inner">
            <!-- Tabs render here dynamically -->
            <div id="tabDashboard" class="tab-active" role="tabpanel" aria-labelledby="btnTabDashboard"></div>
            <div id="tabCalc" class="tab-hidden" role="tabpanel" aria-labelledby="btnTabCalc"></div>
            <div id="tabHistory" class="tab-hidden" role="tabpanel" aria-labelledby="btnTabHistory"></div>
            <div id="tabSettings" class="tab-hidden" role="tabpanel" aria-labelledby="btnTabSettings"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" role="tablist" aria-label="Навігація">
        <button id="btnTabDashboard" class="nav-btn active" role="tab" aria-selected="true" aria-controls="tabDashboard">
            <i class="fa-solid fa-house" aria-hidden="true"></i>
            <span>Головна</span>
        </button>
        <button id="btnTabCalc" class="nav-btn" role="tab" aria-selected="false" aria-controls="tabCalc">
            <i class="fa-solid fa-calculator" aria-hidden="true"></i>
            <span>Рахунок</span>
        </button>
        <button id="btnTabHistory" class="nav-btn" role="tab" aria-selected="false" aria-controls="tabHistory">
            <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i>
            <span>Історія</span>
            <span id="debtBadge" class="badge hidden" aria-label="Неоплачені">0</span>
        </button>
        <button id="btnTabSettings" class="nav-btn" role="tab" aria-selected="false" aria-controls="tabSettings">
            <i class="fa-solid fa-gear" aria-hidden="true"></i>
            <span>Ще</span>
        </button>
    </nav>
</div>

<!-- Modals container -->
<div id="modalsContainer"></div>

<!-- Scripts — ES Modules -->
<script type="module" src="js/app.js"></script>
</body>
</html>
