<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мої Комунальні</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 pb-10">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-600">💧 Комуналка ⚡️</h1>
            <button onclick="toggleSettings()" class="text-gray-500 hover:text-gray-800 bg-white px-3 py-1 rounded-full shadow-sm text-sm font-medium">⚙️ Налаштування</button>
        </div>

        <!-- Налаштування тарифів та Бекап -->
        <div id="settingsPanel" class="hidden bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6 text-sm shadow-inner">
            <h2 class="font-semibold mb-3 text-gray-700">Налаштування цін (₴)</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div><label class="block text-gray-500">Вода (за 1 м³)</label><input type="number" id="tWater" step="0.01" class="w-full border rounded p-1"></div>
                <div><label class="block text-gray-500">Світло (база)</label><input type="number" id="tElectroBase" step="0.01" class="w-full border rounded p-1"></div>
                <div><label class="block text-gray-500">Світло (зима до 2000)</label><input type="number" id="tElectroWinter" step="0.01" class="w-full border rounded p-1"></div>
                <div><label class="block text-gray-500">Нічний коефіцієнт</label><input type="number" id="tNightCoef" step="0.1" class="w-full border rounded p-1"></div>
            </div>
            <button onclick="saveTariffs()" class="w-full bg-gray-800 text-white rounded py-2 font-medium mb-4 active:bg-gray-900">Зберегти тарифи</button>

            <!-- Блок резервної копії -->
            <hr class="border-gray-200 mb-4">
            <h2 class="font-semibold mb-3 text-gray-700 flex justify-between items-center">
                <span>Резервна копія даних</span>
                <span class="text-xs font-normal text-gray-500 bg-gray-200 px-2 py-0.5 rounded">Локальна база</span>
            </h2>
            <div class="flex gap-2">
                <button onclick="exportBackup()" class="flex-1 bg-green-600 text-white rounded-lg py-2 font-medium flex justify-center items-center gap-1 active:bg-green-700 shadow-sm">
                    📥 Зберегти
                </button>
                <label class="flex-1 bg-blue-600 text-white rounded-lg py-2 font-medium flex justify-center items-center gap-1 cursor-pointer active:bg-blue-700 shadow-sm">
                    📤 Відновити
                    <input type="file" accept=".json" class="hidden" onchange="importBackup(event)">
                </label>
            </div>
        </div>

        <!-- Форма додавання -->
        <div class="bg-white p-4 rounded-xl shadow-md mb-6 border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <input type="month" id="monthInput" class="border-b-2 border-blue-500 font-bold text-lg outline-none pb-1 bg-transparent" required>
                <label class="flex items-center space-x-2 text-sm text-blue-600 font-medium bg-blue-50 px-2 py-1.5 rounded-lg">
                    <input type="checkbox" id="isWinterInput" class="rounded accent-blue-600 w-4 h-4">
                    <span>❄️ Зимовий тариф</span>
                </label>
            </div>

            <form id="utilityForm" class="space-y-4">
                <!-- Вода -->
                <div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100">
                    <h3 class="font-semibold text-blue-800 mb-2 flex justify-between">💧 Вода <span id="waterCostDisplay" class="text-blue-900">0.00 ₴</span></h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1">Минулі</label><input type="number" id="wPrev" class="w-full border-gray-200 rounded-lg p-2 bg-white" required></div>
                        <div><label class="block text-[11px] uppercase tracking-wider text-blue-600 font-bold mb-1">Поточні</label><input type="number" id="wCur" class="w-full border-blue-300 rounded-lg p-2 bg-white ring-1 ring-transparent focus:ring-blue-400" required></div>
                    </div>
                </div>

                <!-- Світло -->
                <div class="bg-yellow-50/50 p-3 rounded-xl border border-yellow-100">
                    <h3 class="font-semibold text-yellow-800 mb-2 flex justify-between">⚡️ Світло <span id="electroCostDisplay" class="text-yellow-900">0.00 ₴</span></h3>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div><label class="block text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1">☀️ День (минулі)</label><input type="number" id="dPrev" class="w-full border-gray-200 rounded-lg p-2 bg-white" required></div>
                        <div><label class="block text-[11px] uppercase tracking-wider text-yellow-600 font-bold mb-1">☀️ День (поточні)</label><input type="number" id="dCur" class="w-full border-yellow-300 rounded-lg p-2 bg-white" required></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1">🌙 Ніч (минулі)</label><input type="number" id="nPrev" class="w-full border-gray-200 rounded-lg p-2 bg-white" required></div>
                        <div><label class="block text-[11px] uppercase tracking-wider text-indigo-500 font-bold mb-1">🌙 Ніч (поточні)</label><input type="number" id="nCur" class="w-full border-indigo-200 rounded-lg p-2 bg-white" required></div>
                    </div>
                </div>

                <!-- Фіксовані платежі -->
                <div class="bg-purple-50/50 p-3 rounded-xl border border-purple-100">
                    <h3 class="font-semibold text-purple-800 mb-2 flex justify-between">🏢 Інші платежі <span id="otherCostDisplay" class="text-purple-900">0.00 ₴</span></h3>
                    <div class="grid grid-cols-3 gap-2">
                        <div><label class="block text-[10px] uppercase text-purple-600 font-medium mb-1">Квартплата</label><input type="number" step="0.01" id="pRent" class="w-full border rounded p-1.5 text-sm bg-white"></div>
                        <div><label class="block text-[10px] uppercase text-purple-600 font-medium mb-1">Сміття</label><input type="number" step="0.01" id="pGarbage" class="w-full border rounded p-1.5 text-sm bg-white"></div>
                        <div><label class="block text-[10px] uppercase text-purple-600 font-medium mb-1">Абон. вода</label><input type="number" step="0.01" id="pWaterSub" class="w-full border rounded p-1.5 text-sm bg-white"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center bg-gray-900 text-white p-4 rounded-xl mt-4 shadow-sm">
                    <span class="font-medium text-gray-300">Всього до сплати:</span>
                    <span id="totalCostDisplay" class="font-bold text-2xl">0.00 ₴</span>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl active:bg-blue-700 shadow-md transition-colors text-lg">
                    💾 Зберегти розрахунок
                </button>
            </form>
        </div>

        <!-- Історія -->
        <div>
            <h2 class="text-xl font-bold mb-4 pl-1 text-gray-800">Історія платежів</h2>
            <div id="recordsList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // Ініціалізація даних з локальної пам'яті
        let defaultTariffs = { water: 30.38, electroBase: 4.32, electroWinter: 2.64, winterLimit: 2000, nightCoef: 0.5 };
        let tariffs = JSON.parse(localStorage.getItem('utilityTariffs')) || defaultTariffs;
        let records = JSON.parse(localStorage.getItem('utilityRecords')) || [];

        document.getElementById('tWater').value = tariffs.water;
        document.getElementById('tElectroBase').value = tariffs.electroBase;
        document.getElementById('tElectroWinter').value = tariffs.electroWinter;
        document.getElementById('tNightCoef').value = tariffs.nightCoef;

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        
        function saveTariffs() {
            tariffs = {
                water: parseFloat(document.getElementById('tWater').value) || defaultTariffs.water,
                electroBase: parseFloat(document.getElementById('tElectroBase').value) || defaultTariffs.electroBase,
                electroWinter: parseFloat(document.getElementById('tElectroWinter').value) || defaultTariffs.electroWinter,
                winterLimit: 2000,
                nightCoef: parseFloat(document.getElementById('tNightCoef').value) || defaultTariffs.nightCoef
            };
            localStorage.setItem('utilityTariffs', JSON.stringify(tariffs));
            calculatePreview();
            alert('✅ Тарифи успішно збережено!');
        }

        // --- ЛОГІКА РЕЗЕРВНОЇ КОПІЇ ---
        window.exportBackup = async function() {
            const dataToSave = { tariffs: tariffs, records: records };
            const dataStr = JSON.stringify(dataToSave, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const date = new Date().toISOString().slice(0,10);
            const fileName = `komunalka_backup_${date}.json`;

            if (navigator.share && navigator.canShare) {
                const file = new File([blob], fileName, { type: "application/json" });
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Моя Комуналка - Резервна копія',
                        text: 'Файл з історією платежів. Щоб відновити, натисніть "Відновити" у налаштуваннях застосунку і оберіть цей файл.'
                    });
                    return;
                } catch (err) {
                    console.log('Помилка Share API', err);
                }
            }
            
            // Запасний варіант для ПК/старих браузерів
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        window.importBackup = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.records !== undefined && data.tariffs !== undefined) {
                        localStorage.setItem('utilityRecords', JSON.stringify(data.records));
                        localStorage.setItem('utilityTariffs', JSON.stringify(data.tariffs));
                        alert('✅ Базу успішно відновлено!');
                        location.reload(); 
                    } else {
                        alert('❌ Помилка: Неправильний формат файлу.');
                    }
                } catch(err) {
                    alert('❌ Помилка читання файлу. Це не файл бекапу.');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        };

        // --- КАЛЬКУЛЯТОР ТА ІСТОРІЯ ---
        const monthInput = document.getElementById('monthInput');
        const today = new Date();
        monthInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
        
        function fillPreviousReadings() {
            if(records.length > 0) {
                let lastRecord = records.sort((a, b) => new Date(b.month) - new Date(a.month))[0];
                document.getElementById('wPrev').value = lastRecord.wCur || 0;
                document.getElementById('dPrev').value = lastRecord.dCur || 0;
                document.getElementById('nPrev').value = lastRecord.nCur || 0;
                
                document.getElementById('pRent').value = lastRecord.rent || '';
                document.getElementById('pGarbage').value = lastRecord.garbage || '';
                document.getElementById('pWaterSub').value = lastRecord.waterSub || '';
                
                let m = new Date(monthInput.value).getMonth() + 1;
                document.getElementById('isWinterInput').checked = (m >= 10 || m <= 4);
            }
        }
        fillPreviousReadings();

        const inputs = ['wPrev', 'wCur', 'dPrev', 'dCur', 'nPrev', 'nCur', 'isWinterInput', 'pRent', 'pGarbage', 'pWaterSub'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculatePreview));

        let currentCalc = { waterCost: 0, electroCost: 0, otherCost: 0, total: 0 };

        function calculatePreview() {
            let getVal = id => Math.max(0, parseFloat(document.getElementById(id).value) || 0);
            
            let wVol = Math.max(0, getVal('wCur') - getVal('wPrev'));
            currentCalc.waterCost = wVol * tariffs.water;

            let dVol = Math.max(0, getVal('dCur') - getVal('dPrev'));
            let nVol = Math.max(0, getVal('nCur') - getVal('nPrev'));
            let totalElectroVol = dVol + nVol;
            let isWinter = document.getElementById('isWinterInput').checked;

            if (totalElectroVol === 0) {
                currentCalc.electroCost = 0;
            } else if (isWinter) {
                if (totalElectroVol <= tariffs.winterLimit) {
                    currentCalc.electroCost = (dVol * tariffs.electroWinter) + (nVol * tariffs.electroWinter * tariffs.nightCoef);
                } else {
                    let dProp = dVol / totalElectroVol;
                    let nProp = nVol / totalElectroVol;
                    let limitCost = (tariffs.winterLimit * dProp * tariffs.electroWinter) + (tariffs.winterLimit * nProp * tariffs.electroWinter * tariffs.nightCoef);
                    let excessVol = totalElectroVol - tariffs.winterLimit;
                    let excessCost = (excessVol * dProp * tariffs.electroBase) + (excessVol * nProp * tariffs.electroBase * tariffs.nightCoef);
                    currentCalc.electroCost = limitCost + excessCost;
                }
            } else {
                currentCalc.electroCost = (dVol * tariffs.electroBase) + (nVol * tariffs.electroBase * tariffs.nightCoef);
            }

            currentCalc.otherCost = getVal('pRent') + getVal('pGarbage') + getVal('pWaterSub');
            currentCalc.total = currentCalc.waterCost + currentCalc.electroCost + currentCalc.otherCost;

            document.getElementById('waterCostDisplay').innerText = currentCalc.waterCost.toFixed(2) + ' ₴';
            document.getElementById('electroCostDisplay').innerText = currentCalc.electroCost.toFixed(2) + ' ₴';
            document.getElementById('otherCostDisplay').innerText = currentCalc.otherCost.toFixed(2) + ' ₴';
            document.getElementById('totalCostDisplay').innerText = currentCalc.total.toFixed(2) + ' ₴';
        }

        document.getElementById('utilityForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newRecord = {
                id: Date.now(),
                month: monthInput.value,
                wPrev: parseFloat(document.getElementById('wPrev').value) || 0,
                wCur: parseFloat(document.getElementById('wCur').value) || 0,
                dPrev: parseFloat(document.getElementById('dPrev').value) || 0,
                dCur: parseFloat(document.getElementById('dCur').value) || 0,
                nPrev: parseFloat(document.getElementById('nPrev').value) || 0,
                nCur: parseFloat(document.getElementById('nCur').value) || 0,
                rent: parseFloat(document.getElementById('pRent').value) || 0,
                garbage: parseFloat(document.getElementById('pGarbage').value) || 0,
                waterSub: parseFloat(document.getElementById('pWaterSub').value) || 0,
                waterCost: currentCalc.waterCost,
                electroCost: currentCalc.electroCost,
                otherCost: currentCalc.otherCost,
                total: currentCalc.total,
                paid: false
            };

            const existingIndex = records.findIndex(r => r.month === newRecord.month);
            if(existingIndex >= 0) {
                if(confirm('Запис за цей місяць вже існує. Оновити його новими даними?')) records[existingIndex] = newRecord;
                else return;
            } else {
                records.push(newRecord);
            }

            saveData();
            
            let [y, m] = monthInput.value.split('-');
            let nextDate = new Date(y, m); 
            monthInput.value = `${nextDate.getFullYear()}-${String(nextDate.getMonth() + 1).padStart(2, '0')}`;
            fillPreviousReadings();
            calculatePreview();
        });

        function renderRecords() {
            const list = document.getElementById('recordsList');
            list.innerHTML = '';
            records.sort((a, b) => new Date(b.month) - new Date(a.month)).forEach((rec, index) => {
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl shadow-sm border border-gray-100 bg-white relative transition-all ${rec.paid ? 'opacity-80 ring-2 ring-green-400' : 'border-l-4 border-l-red-500'}`;
                
                let wVol = rec.wCur - rec.wPrev;
                let dVol = rec.dCur - rec.dPrev;
                let nVol = rec.nCur - rec.nPrev;
                let dateStr = new Date(rec.month + '-01').toLocaleString('uk-UA', {month:'long', year:'numeric'}).replace(' р.','');

                let otherHTML = '';
                if(rec.otherCost > 0) {
                    otherHTML = `
                    <div class="mt-3 pt-2 border-t border-dashed text-sm flex flex-col gap-1">
                        <div class="flex justify-between text-purple-800 font-medium">
                            <span>🏢 Інші платежі</span>
                            <span>${rec.otherCost.toFixed(2)} ₴</span>
                        </div>
                        <div class="text-xs text-gray-500 flex flex-wrap gap-x-3">
                            ${rec.rent ? `<span>Квартпл: ${rec.rent}</span>` : ''}
                            ${rec.garbage ? `<span>Сміття: ${rec.garbage}</span>` : ''}
                            ${rec.waterSub ? `<span>Абон.вода: ${rec.waterSub}</span>` : ''}
                        </div>
                    </div>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3 pb-2 border-b">
                        <span class="font-bold text-lg capitalize text-gray-800">${dateStr}</span>
                        <span class="font-black text-xl text-gray-900">${rec.total.toFixed(2)} ₴</span>
                    </div>

                    <div class="space-y-3">
                        <div class="flex flex-col">
                            <div class="flex justify-between items-center">
                                <span class="font-medium text-blue-700">💧 Вода</span>
                                <span class="font-semibold text-gray-800">${rec.waterCost.toFixed(2)} ₴</span>
                            </div>
                            <div class="flex justify-between items-center text-xs text-gray-500 mt-1 bg-gray-50 p-1.5 rounded">
                                <span>Мин: ${rec.wPrev}</span>
                                <span class="text-blue-600 font-medium bg-blue-100 px-2 py-0.5 rounded">Пот: <b class="text-[13px] text-gray-900">${rec.wCur}</b></span>
                                <span>${wVol} м³</span>
                            </div>
                        </div>

                        <div class="flex flex-col">
                            <div class="flex justify-between items-center">
                                <span class="font-medium text-yellow-600">⚡️ Світло</span>
                                <span class="font-semibold text-gray-800">${rec.electroCost.toFixed(2)} ₴</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-xs text-gray-500 mt-1 bg-gray-50 p-1.5 rounded">
                                <div>
                                    <span class="block text-[10px] uppercase text-yellow-600 font-medium mb-0.5">День (${dVol} кВт)</span>
                                    ${rec.dPrev} &rarr; <b class="text-[13px] text-gray-900">${rec.dCur}</b>
                                </div>
                                <div>
                                    <span class="block text-[10px] uppercase text-indigo-500 font-medium mb-0.5">Ніч (${nVol} кВт)</span>
                                    ${rec.nPrev} &rarr; <b class="text-[13px] text-gray-900">${rec.nCur}</b>
                                </div>
                            </div>
                        </div>
                    </div>

                    ${otherHTML}

                    <div class="mt-4 pt-3 border-t border-gray-100 flex gap-2 justify-between">
                        <button onclick="togglePaid(${index})" class="flex-1 text-center py-2 rounded-lg font-bold text-sm transition-colors ${rec.paid ? 'bg-green-100 text-green-700' : 'bg-red-50 text-red-600 border border-red-100'}">
                            ${rec.paid ? '✅ ОПЛАЧЕНО' : '💳 СПЛАТИТИ'}
                        </button>
                        <button onclick="copyData(${index})" class="px-3 py-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200 text-sm font-medium" title="Скопіювати для банку">📋</button>
                        <button onclick="editRecord(${index})" class="px-3 py-2 bg-blue-50 rounded-lg text-blue-600 hover:bg-blue-100" title="Редагувати">✏️</button>
                        <button onclick="deleteRecord(${index})" class="px-3 py-2 bg-red-50 rounded-lg text-red-500 hover:bg-red-100" title="Видалити">🗑</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        window.copyData = function(index) {
            let rec = records[index];
            let text = `Показники за ${rec.month}:\n💧 Вода: ${rec.wCur}\n☀️ Світло (день): ${rec.dCur}\n🌙 Світло (ніч): ${rec.nCur}`;
            navigator.clipboard.writeText(text).then(() => alert('📋 Показники скопійовано!'));
        };

        window.editRecord = function(index) {
            let rec = records[index];
            document.getElementById('monthInput').value = rec.month;
            
            document.getElementById('wPrev').value = rec.wPrev; document.getElementById('wCur').value = rec.wCur;
            document.getElementById('dPrev').value = rec.dPrev; document.getElementById('dCur').value = rec.dCur;
            document.getElementById('nPrev').value = rec.nPrev; document.getElementById('nCur').value = rec.nCur;
            
            document.getElementById('pRent').value = rec.rent || '';
            document.getElementById('pGarbage').value = rec.garbage || '';
            document.getElementById('pWaterSub').value = rec.waterSub || '';
            
            let m = new Date(rec.month).getMonth() + 1;
            document.getElementById('isWinterInput').checked = (m >= 10 || m <= 4);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            calculatePreview();
        };

        window.togglePaid = function(index) { records[index].paid = !records[index].paid; saveData(); };
        window.deleteRecord = function(index) { if(confirm('Точно видалити цей місяць?')) { records.splice(index, 1); saveData(); } };
        function saveData() { localStorage.setItem('utilityRecords', JSON.stringify(records)); renderRecords(); }

        renderRecords();
        calculatePreview();
    </script>

    <!-- Скрипт для АВТОМАТИЧНОГО оновлення застосунку без зміни версій -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(registration => {
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('Доступне оновлення! Перезавантажую...');
                            window.location.reload();
                        }
                    });
                });
            }).catch(err => console.error('Помилка реєстрації SW:', err));
        }
    </script>
</body>
</html>
