<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мої Комунальні</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        .details-content { transition: max-height 0.3s ease-in-out; overflow: hidden; max-height: 0; }
        .details-content.open { max-height: 1000px; }
        .chevron { transition: transform 0.3s; }
        .chevron.open { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col">

    <!-- Екран Логіну -->
    <div id="loginScreen" class="flex-1 flex flex-col items-center justify-center p-6 bg-white">
        <h1 class="text-4xl font-bold text-blue-600 mb-2">💧 Комуналка ⚡️</h1>
        <p class="text-gray-500 text-center mb-8">Захищена хмарна синхронізація</p>
        
        <form id="loginForm" class="w-full max-w-xs space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Ваш логін (номер або нік)</label>
                <input type="text" id="phoneInput" required class="w-full border border-gray-300 rounded-xl p-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                <input type="password" id="passInput" required class="w-full border border-gray-300 rounded-xl p-3 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <p id="loginError" class="text-red-500 text-sm hidden text-center font-medium"></p>
            <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md active:bg-blue-700 mt-2">
                Увійти / Створити
            </button>
        </form>
    </div>

    <!-- Основний застосунок -->
    <div id="appScreen" class="hidden flex-1 overflow-y-auto p-4 pb-10">
        <div class="max-w-md mx-auto">
            
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl font-bold text-blue-600">💧 Комуналка ⚡️</h1>
                <div class="flex gap-2 items-center">
                    <button onclick="toggleSettings()" class="text-gray-600 bg-white px-3 py-1.5 rounded-full shadow-sm text-sm font-medium border border-gray-100">⚙️ Налаштування</button>
                    <button onclick="logout()" class="text-red-500 bg-red-50 px-3 py-1.5 rounded-full text-sm font-medium">Вийти</button>
                </div>
            </div>

            <!-- Налаштування тарифів -->
            <div id="settingsPanel" class="hidden bg-white p-4 rounded-xl border border-gray-200 mb-6 text-sm shadow-sm">
                <h2 class="font-semibold text-gray-700 border-b pb-2 mb-3">Налаштування цін (₴)</h2>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div><label class="block text-gray-500 text-xs mb-1">Вода (за 1 м³)</label><input type="number" id="tWater" step="0.01" class="w-full border rounded-lg p-2 bg-gray-50"></div>
                    <div><label class="block text-gray-500 text-xs mb-1">Світло (база)</label><input type="number" id="tElectroBase" step="0.01" class="w-full border rounded-lg p-2 bg-gray-50"></div>
                    <div><label class="block text-gray-500 text-xs mb-1">Світло (зима до 2000)</label><input type="number" id="tElectroWinter" step="0.01" class="w-full border rounded-lg p-2 bg-gray-50"></div>
                    <div><label class="block text-gray-500 text-xs mb-1">Нічний коефіцієнт</label><input type="number" id="tNightCoef" step="0.1" class="w-full border rounded-lg p-2 bg-gray-50"></div>
                    <div class="col-span-2"><label class="block text-gray-500 text-xs mb-1">🔥 Газ (за 1 м³)</label><input type="number" id="tGas" step="0.01" class="w-full border rounded-lg p-2 bg-orange-50"></div>
                </div>
                <button onclick="saveTariffs()" class="w-full bg-gray-800 text-white rounded-lg py-2.5 font-medium active:bg-gray-900 shadow-sm">☁️ Зберегти тарифи</button>
            </div>

            <!-- Форма додавання -->
            <div class="bg-white p-4 rounded-xl shadow-md mb-6 border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <input type="month" id="monthInput" class="border-b-2 border-blue-500 font-bold text-lg outline-none pb-1 bg-transparent text-gray-800" required>
                    <label class="flex items-center space-x-2 text-sm text-blue-600 font-medium bg-blue-50 px-2 py-1.5 rounded-lg">
                        <input type="checkbox" id="isWinterInput" class="rounded accent-blue-600 w-4 h-4">
                        <span>❄️ Зима</span>
                    </label>
                </div>

                <form id="utilityForm" class="space-y-4">
                    <div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100">
                        <h3 class="font-semibold text-blue-800 mb-2 flex justify-between">💧 Вода <span id="waterCostDisplay" class="text-blue-900">0.00 ₴</span></h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-[11px] text-gray-500 font-medium mb-1">Минулі</label><input type="number" id="wPrev" class="w-full border-gray-200 rounded-lg p-2 bg-white" required></div>
                            <div><label class="block text-[11px] text-blue-600 font-bold mb-1">Поточні</label><input type="number" id="wCur" class="w-full border-blue-300 rounded-lg p-2 bg-white" required></div>
                        </div>
                    </div>

                    <div class="bg-yellow-50/50 p-3 rounded-xl border border-yellow-100">
                        <h3 class="font-semibold text-yellow-800 mb-2 flex justify-between">⚡️ Світло <span id="electroCostDisplay" class="text-yellow-900">0.00 ₴</span></h3>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label class="block text-[11px] text-gray-500 font-medium mb-1">☀️ День (минулі)</label><input type="number" id="dPrev" class="w-full border-gray-200 rounded-lg p-2 bg-white" required></div>
                            <div><label class="block text-[11px] text-yellow-600 font-bold mb-1">☀️ День (поточні)</label><input type="number" id="dCur" class="w-full border-yellow-300 rounded-lg p-2 bg-white" required></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-[11px] text-gray-500 font-medium mb-1">🌙 Ніч (минулі)</label><input type="number" id="nPrev" class="w-full border-gray-200 rounded-lg p-2 bg-white" required></div>
                            <div><label class="block text-[11px] text-indigo-500 font-bold mb-1">🌙 Ніч (поточні)</label><input type="number" id="nCur" class="w-full border-indigo-200 rounded-lg p-2 bg-white" required></div>
                        </div>
                    </div>

                    <div class="bg-orange-50/50 p-3 rounded-xl border border-orange-100">
                        <h3 class="font-semibold text-orange-800 mb-2 flex justify-between">🔥 Газ <span id="gasCostDisplay" class="text-orange-900">0.00 ₴</span></h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-[11px] text-gray-500 font-medium mb-1">Минулі</label><input type="number" id="gPrev" class="w-full border-gray-200 rounded-lg p-2 bg-white"></div>
                            <div><label class="block text-[11px] text-orange-600 font-bold mb-1">Поточні</label><input type="number" id="gCur" class="w-full border-orange-300 rounded-lg p-2 bg-white"></div>
                        </div>
                    </div>

                    <div class="bg-purple-50/50 p-3 rounded-xl border border-purple-100">
                        <h3 class="font-semibold text-purple-800 mb-2 flex justify-between">🏢 Інші платежі <span id="otherCostDisplay" class="text-purple-900">0.00 ₴</span></h3>
                        <div class="grid grid-cols-3 gap-2">
                            <div><label class="block text-[10px] text-purple-600 font-medium mb-1">Квартплата</label><input type="number" step="0.01" id="pRent" class="w-full border rounded p-1.5 text-sm bg-white"></div>
                            <div><label class="block text-[10px] text-purple-600 font-medium mb-1">Сміття</label><input type="number" step="0.01" id="pGarbage" class="w-full border rounded p-1.5 text-sm bg-white"></div>
                            <div><label class="block text-[10px] text-purple-600 font-medium mb-1">Абон. вода</label><input type="number" step="0.01" id="pWaterSub" class="w-full border rounded p-1.5 text-sm bg-white"></div>
                        </div>
                    </div>

                    <div class="flex justify-between items-center bg-gray-900 text-white p-4 rounded-xl mt-4 shadow-sm">
                        <span class="font-medium text-gray-300">Всього до сплати:</span>
                        <span id="totalCostDisplay" class="font-bold text-2xl">0.00 ₴</span>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl active:bg-blue-700 shadow-md transition-colors text-lg">
                        ☁️ Зберегти в хмару
                    </button>
                </form>
            </div>

            <!-- Блок Статистики -->
            <div class="mb-4 flex justify-between items-center bg-green-50 p-3 rounded-xl border border-green-200">
                <div>
                    <p class="text-xs text-green-700 font-semibold uppercase tracking-wider">📊 Загальні витрати</p>
                    <p id="statsTotal" class="font-black text-xl text-green-900">0 ₴</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-green-700 font-medium">Середнє за місяць</p>
                    <p id="statsAvg" class="font-bold text-green-800">0 ₴</p>
                </div>
            </div>

            <!-- Історія -->
            <div>
                <h2 class="text-xl font-bold mb-3 pl-1 text-gray-800">Історія платежів</h2>
                <div id="recordsList" class="space-y-3 pb-8"></div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://komynalka.mikolenko-anton1.workers.dev";
        
        let sessionPhone = localStorage.getItem('k_phoneHash');
        let sessionPass = localStorage.getItem('k_passHash');
        
        let defaultTariffs = { water: 30.38, electroBase: 4.32, electroWinter: 2.64, winterLimit: 2000, nightCoef: 0.5, gas: 7.96 };
        let tariffs = { ...defaultTariffs };
        let records = [];

        const loginScreen = document.getElementById('loginScreen');
        const appScreen = document.getElementById('appScreen');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        // Хешування для безпеки
        async function getHash(text) {
            const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
            return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function fetchFromCloud(phoneH, passH) {
            const res = await fetch(`${WORKER_URL}?phone=${phoneH}&pass=${passH}`);
            const data = await res.json();
            if (res.status === 403) throw new Error("WRONG_PASSWORD");
            if (res.status === 404) return false; // Новий юзер
            if (res.ok && data.success) {
                tariffs = data.data.tariffs || defaultTariffs;
                records = data.data.records || [];
                return true;
            }
            throw new Error("SERVER_ERROR");
        }

        async function syncToCloud() {
            if (!sessionPhone || !sessionPass) return;
            const payload = { tariffs, records };
            await fetch(`${WORKER_URL}?phone=${sessionPhone}&pass=${sessionPass}`, {
                method: 'POST', body: JSON.stringify(payload)
            });
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phoneStr = document.getElementById('phoneInput').value.toLowerCase().trim();
            const passStr = document.getElementById('passInput').value;
            
            loginBtn.innerText = "Завантаження...";
            loginBtn.disabled = true;
            loginError.classList.add('hidden');

            const phoneH = await getHash(phoneStr);
            const passH = await getHash(passStr);

            try {
                const exists = await fetchFromCloud(phoneH, passH);
                if (!exists) {
                    // Якщо новий, одразу створюємо порожню базу
                    records = []; 
                    tariffs = {...defaultTariffs};
                    sessionPhone = phoneH; sessionPass = passH;
                    await syncToCloud();
                }
                
                sessionPhone = phoneH; sessionPass = passH;
                localStorage.setItem('k_phoneHash', sessionPhone);
                localStorage.setItem('k_passHash', sessionPass);
                initAppUI();
            } catch (err) {
                loginBtn.innerText = "Увійти / Створити";
                loginBtn.disabled = false;
                loginError.innerText = err.message === "WRONG_PASSWORD" ? "❌ Неправильний пароль!" : "❌ Помилка з'єднання.";
                loginError.classList.remove('hidden');
            }
        });

        window.logout = function() {
            if(confirm('Точно вийти?')){
                localStorage.removeItem('k_phoneHash');
                localStorage.removeItem('k_passHash');
                location.reload();
            }
        };

        function initAppUI() {
            loginScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            appScreen.classList.add('flex');

            document.getElementById('tWater').value = tariffs.water || defaultTariffs.water;
            document.getElementById('tElectroBase').value = tariffs.electroBase || defaultTariffs.electroBase;
            document.getElementById('tElectroWinter').value = tariffs.electroWinter || defaultTariffs.electroWinter;
            document.getElementById('tNightCoef').value = tariffs.nightCoef || defaultTariffs.nightCoef;
            document.getElementById('tGas').value = tariffs.gas || defaultTariffs.gas;

            fillPreviousReadings();
            renderRecords();
            calculatePreview();
        }

        if (sessionPhone && sessionPass) {
            loginScreen.classList.add('hidden');
            fetchFromCloud(sessionPhone, sessionPass).then(() => initAppUI()).catch(() => {
                loginScreen.classList.remove('hidden');
                localStorage.clear();
            });
        }

        window.toggleSettings = () => document.getElementById('settingsPanel').classList.toggle('hidden');
        
        window.saveTariffs = () => {
            tariffs = {
                water: parseFloat(document.getElementById('tWater').value) || defaultTariffs.water,
                electroBase: parseFloat(document.getElementById('tElectroBase').value) || defaultTariffs.electroBase,
                electroWinter: parseFloat(document.getElementById('tElectroWinter').value) || defaultTariffs.electroWinter,
                winterLimit: 2000,
                nightCoef: parseFloat(document.getElementById('tNightCoef').value) || defaultTariffs.nightCoef,
                gas: parseFloat(document.getElementById('tGas').value) || defaultTariffs.gas
            };
            syncToCloud();
            window.toggleSettings();
            calculatePreview();
            alert('☁️ Тарифи оновлено!');
        };

        const monthInput = document.getElementById('monthInput');
        const today = new Date();
        monthInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
        
        function fillPreviousReadings() {
            if(records.length > 0) {
                let lastRecord = records.sort((a, b) => new Date(b.month) - new Date(a.month))[0];
                document.getElementById('wPrev').value = lastRecord.wCur || 0;
                document.getElementById('dPrev').value = lastRecord.dCur || 0;
                document.getElementById('nPrev').value = lastRecord.nCur || 0;
                document.getElementById('gPrev').value = lastRecord.gCur || 0;
                
                document.getElementById('pRent').value = lastRecord.rent || '';
                document.getElementById('pGarbage').value = lastRecord.garbage || '';
                document.getElementById('pWaterSub').value = lastRecord.waterSub || '';
                
                let m = new Date(monthInput.value).getMonth() + 1;
                document.getElementById('isWinterInput').checked = (m >= 10 || m <= 4);
            }
        }

        const inputs = ['wPrev', 'wCur', 'dPrev', 'dCur', 'nPrev', 'nCur', 'gPrev', 'gCur', 'isWinterInput', 'pRent', 'pGarbage', 'pWaterSub'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculatePreview));

        let currentCalc = { waterCost: 0, electroCost: 0, gasCost: 0, otherCost: 0, total: 0 };

        function calculatePreview() {
            let getVal = id => Math.max(0, parseFloat(document.getElementById(id).value) || 0);
            
            let wVol = Math.max(0, getVal('wCur') - getVal('wPrev'));
            currentCalc.waterCost = wVol * tariffs.water;

            let dVol = Math.max(0, getVal('dCur') - getVal('dPrev'));
            let nVol = Math.max(0, getVal('nCur') - getVal('nPrev'));
            let totalElectroVol = dVol + nVol;
            let isWinter = document.getElementById('isWinterInput').checked;

            if (totalElectroVol === 0) currentCalc.electroCost = 0;
            else if (isWinter) {
                if (totalElectroVol <= tariffs.winterLimit) {
                    currentCalc.electroCost = (dVol * tariffs.electroWinter) + (nVol * tariffs.electroWinter * tariffs.nightCoef);
                } else {
                    let dProp = dVol / totalElectroVol;
                    let nProp = nVol / totalElectroVol;
                    let limitCost = (tariffs.winterLimit * dProp * tariffs.electroWinter) + (tariffs.winterLimit * nProp * tariffs.electroWinter * tariffs.nightCoef);
                    let excessCost = ((totalElectroVol - tariffs.winterLimit) * dProp * tariffs.electroBase) + ((totalElectroVol - tariffs.winterLimit) * nProp * tariffs.electroBase * tariffs.nightCoef);
                    currentCalc.electroCost = limitCost + excessCost;
                }
            } else {
                currentCalc.electroCost = (dVol * tariffs.electroBase) + (nVol * tariffs.electroBase * tariffs.nightCoef);
            }

            let gVol = Math.max(0, getVal('gCur') - getVal('gPrev'));
            currentCalc.gasCost = gVol * (tariffs.gas || defaultTariffs.gas);

            currentCalc.otherCost = getVal('pRent') + getVal('pGarbage') + getVal('pWaterSub');
            currentCalc.total = currentCalc.waterCost + currentCalc.electroCost + currentCalc.gasCost + currentCalc.otherCost;

            document.getElementById('waterCostDisplay').innerText = currentCalc.waterCost.toFixed(2) + ' ₴';
            document.getElementById('electroCostDisplay').innerText = currentCalc.electroCost.toFixed(2) + ' ₴';
            document.getElementById('gasCostDisplay').innerText = currentCalc.gasCost.toFixed(2) + ' ₴';
            document.getElementById('otherCostDisplay').innerText = currentCalc.otherCost.toFixed(2) + ' ₴';
            document.getElementById('totalCostDisplay').innerText = currentCalc.total.toFixed(2) + ' ₴';
        }

        document.getElementById('utilityForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newRecord = {
                id: Date.now(),
                month: monthInput.value,
                wPrev: parseFloat(document.getElementById('wPrev').value) || 0, wCur: parseFloat(document.getElementById('wCur').value) || 0,
                dPrev: parseFloat(document.getElementById('dPrev').value) || 0, dCur: parseFloat(document.getElementById('dCur').value) || 0,
                nPrev: parseFloat(document.getElementById('nPrev').value) || 0, nCur: parseFloat(document.getElementById('nCur').value) || 0,
                gPrev: parseFloat(document.getElementById('gPrev').value) || 0, gCur: parseFloat(document.getElementById('gCur').value) || 0,
                rent: parseFloat(document.getElementById('pRent').value) || 0, garbage: parseFloat(document.getElementById('pGarbage').value) || 0, waterSub: parseFloat(document.getElementById('pWaterSub').value) || 0,
                waterCost: currentCalc.waterCost, electroCost: currentCalc.electroCost, gasCost: currentCalc.gasCost, otherCost: currentCalc.otherCost,
                total: currentCalc.total, paid: false
            };

            const existingIndex = records.findIndex(r => r.month === newRecord.month);
            if(existingIndex >= 0) {
                if(confirm('Оновити запис за цей місяць?')) records[existingIndex] = newRecord;
                else return;
            } else records.push(newRecord);

            renderRecords();
            syncToCloud(); 
            
            let [y, m] = monthInput.value.split('-');
            let nextDate = new Date(y, m); 
            monthInput.value = `${nextDate.getFullYear()}-${String(nextDate.getMonth() + 1).padStart(2, '0')}`;
            fillPreviousReadings();
            calculatePreview();
        });

        // АКОРДЕОН ТА СТАТИСТИКА
        window.toggleRecord = function(index) {
            const content = document.getElementById(`details-${index}`);
            const chevron = document.getElementById(`chev-${index}`);
            content.classList.toggle('open');
            chevron.classList.toggle('open');
        };

        function renderRecords() {
            const list = document.getElementById('recordsList');
            list.innerHTML = '';
            
            // Оновлення статистики
            let totalSum = records.reduce((sum, r) => sum + r.total, 0);
            let avgSum = records.length ? (totalSum / records.length) : 0;
            document.getElementById('statsTotal').innerText = totalSum.toFixed(0) + ' ₴';
            document.getElementById('statsAvg').innerText = avgSum.toFixed(0) + ' ₴';

            records.sort((a, b) => new Date(b.month) - new Date(a.month)).forEach((rec, index) => {
                const card = document.createElement('div');
                card.className = `rounded-xl shadow-sm border bg-white overflow-hidden transition-all ${rec.paid ? 'border-green-300 ring-1 ring-green-100' : 'border-gray-200 border-l-4 border-l-red-500'}`;
                
                let dateStr = new Date(rec.month + '-01').toLocaleString('uk-UA', {month:'long', year:'numeric'}).replace(' р.','');

                // Заголовок (клікабельний)
                let headerHTML = `
                    <div class="p-4 flex justify-between items-center cursor-pointer bg-white hover:bg-gray-50 active:bg-gray-100" onclick="toggleRecord(${index})">
                        <div class="flex items-center gap-3">
                            <span id="chev-${index}" class="chevron text-gray-400">▼</span>
                            <div>
                                <h4 class="font-bold capitalize text-gray-800 leading-tight">${dateStr}</h4>
                                <span class="text-xs font-medium px-2 py-0.5 rounded-full ${rec.paid ? 'bg-green-100 text-green-700' : 'bg-red-50 text-red-600'}">${rec.paid ? 'Оплачено' : 'Не оплачено'}</span>
                            </div>
                        </div>
                        <span class="font-black text-lg text-gray-900">${rec.total.toFixed(2)} ₴</span>
                    </div>
                `;

                // Вміст (прихований за замовчуванням)
                let detailsHTML = `
                    <div id="details-${index}" class="details-content bg-gray-50/50 border-t border-gray-100 px-4">
                        <div class="py-3 space-y-2 text-sm">
                            <div class="flex justify-between border-b border-gray-200 border-dashed pb-1"><span class="text-blue-700">💧 Вода (${rec.wCur - rec.wPrev} м³)</span><span class="font-semibold">${rec.waterCost.toFixed(2)} ₴</span></div>
                            <div class="flex justify-between border-b border-gray-200 border-dashed pb-1"><span class="text-yellow-600">⚡️ Світло (${(rec.dCur - rec.dPrev) + (rec.nCur - rec.nPrev)} кВт)</span><span class="font-semibold">${rec.electroCost.toFixed(2)} ₴</span></div>
                            ${rec.gasCost > 0 ? `<div class="flex justify-between border-b border-gray-200 border-dashed pb-1"><span class="text-orange-600">🔥 Газ (${rec.gCur - (rec.gPrev||0)} м³)</span><span class="font-semibold">${rec.gasCost.toFixed(2)} ₴</span></div>` : ''}
                            ${rec.otherCost > 0 ? `<div class="flex justify-between pb-1"><span class="text-purple-700">🏢 Інші (${rec.rent||0} + ${rec.garbage||0} + ${rec.waterSub||0})</span><span class="font-semibold">${rec.otherCost.toFixed(2)} ₴</span></div>` : ''}
                        </div>
                        <div class="pb-4 pt-1 flex gap-2 justify-between">
                            <button onclick="togglePaid(${index})" class="flex-1 py-2 rounded-lg font-bold text-sm transition-colors ${rec.paid ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-gray-800 text-white hover:bg-gray-900'}">${rec.paid ? 'Скасувати оплату' : '💳 Відмітити сплаченим'}</button>
                            <button onclick="editRecord(${index})" class="px-3 py-2 bg-blue-100 rounded-lg text-blue-700 hover:bg-blue-200" title="Редагувати">✏️</button>
                            <button onclick="deleteRecord(${index})" class="px-3 py-2 bg-red-100 rounded-lg text-red-600 hover:bg-red-200" title="Видалити">🗑</button>
                        </div>
                    </div>
                `;

                card.innerHTML = headerHTML + detailsHTML;
                list.appendChild(card);
            });
        }

        window.editRecord = function(index) {
            let rec = records[index];
            document.getElementById('monthInput').value = rec.month;
            document.getElementById('wPrev').value = rec.wPrev; document.getElementById('wCur').value = rec.wCur;
            document.getElementById('dPrev').value = rec.dPrev; document.getElementById('dCur').value = rec.dCur;
            document.getElementById('nPrev').value = rec.nPrev; document.getElementById('nCur').value = rec.nCur;
            document.getElementById('gPrev').value = rec.gPrev || ''; document.getElementById('gCur').value = rec.gCur || '';
            document.getElementById('pRent').value = rec.rent || ''; document.getElementById('pGarbage').value = rec.garbage || ''; document.getElementById('pWaterSub').value = rec.waterSub || '';
            
            let m = new Date(rec.month).getMonth() + 1;
            document.getElementById('isWinterInput').checked = (m >= 10 || m <= 4);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            calculatePreview();
        };

        window.togglePaid = function(index) { records[index].paid = !records[index].paid; renderRecords(); syncToCloud(); };
        window.deleteRecord = function(index) { if(confirm('Точно видалити цей місяць?')) { records.splice(index, 1); renderRecords(); syncToCloud(); } };

    </script>

    <!-- Скрипт для АВТОМАТИЧНОГО оновлення застосунку -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(registration => {
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            window.location.reload();
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
