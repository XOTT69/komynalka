<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комуналка — Адмін</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f8fafc; }
        .stat-card { transition: transform .15s; }
        .stat-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Login -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center bg-slate-50 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-xl border max-w-sm w-full mx-4">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white text-2xl">🔒</div>
                <h1 class="text-xl font-black">Адмін-панель</h1>
                <p class="text-sm text-slate-500">Комуналка PWA</p>
            </div>
            <input type="password" id="adminPass" placeholder="Пароль адміністратора" class="w-full p-4 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-red-500 font-medium">
            <button onclick="adminLogin()" class="w-full bg-red-500 text-white font-bold py-4 rounded-xl hover:bg-red-600 active:scale-95 transition-transform">Увійти</button>
            <p id="loginError" class="text-red-500 text-sm text-center mt-3 hidden font-bold"></p>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="hidden">
        <!-- Header -->
        <div class="bg-white border-b sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-500 rounded-xl flex items-center justify-center text-white font-bold">⚡</div>
                    <div>
                        <h1 class="font-black text-lg">Комуналка Admin</h1>
                        <p class="text-xs text-slate-400" id="lastUpdate">—</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="loadStats()" class="px-4 py-2 bg-slate-100 rounded-xl text-sm font-bold hover:bg-slate-200 active:scale-95 transition-transform"><i class="fa-solid fa-sync mr-1"></i>Оновити</button>
                    <button onclick="openBroadcast()" class="px-4 py-2 bg-blue-500 text-white rounded-xl text-sm font-bold hover:bg-blue-600 active:scale-95 transition-transform"><i class="fa-solid fa-bullhorn mr-1"></i>Оголошення</button>
                    <button onclick="adminLogout()" class="px-4 py-2 bg-red-50 text-red-500 rounded-xl text-sm font-bold hover:bg-red-100 active:scale-95 transition-transform">Вийти</button>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto px-6 py-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="stat-card bg-white p-6 rounded-2xl border shadow-sm">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500 text-xl">👥</div>
                        <span class="text-sm font-bold text-slate-500">Всього юзерів</span>
                    </div>
                    <p class="text-3xl font-black text-slate-900" id="statUsers">0</p>
                </div>
                <div class="stat-card bg-white p-6 rounded-2xl border shadow-sm">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center text-green-500 text-xl">🔥</div>
                        <span class="text-sm font-bold text-slate-500">Активні цей міс.</span>
                    </div>
                    <p class="text-3xl font-black text-green-600" id="statActive">0</p>
                </div>
                <div class="stat-card bg-white p-6 rounded-2xl border shadow-sm">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center text-purple-500 text-xl">📊</div>
                        <span class="text-sm font-bold text-slate-500">Всього записів</span>
                    </div>
                    <p class="text-3xl font-black text-slate-900" id="statRecords">0</p>
                </div>
                <div class="stat-card bg-white p-6 rounded-2xl border shadow-sm">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center text-orange-500 text-xl">📈</div>
                        <span class="text-sm font-bold text-slate-500">Retention</span>
                    </div>
                    <p class="text-3xl font-black text-orange-600" id="statRetention">0%</p>
                </div>
            </div>

            <!-- Search -->
            <div class="bg-white p-4 rounded-2xl border shadow-sm mb-6">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchUsers" placeholder="Пошук по логіну..." oninput="filterUsers(this.value)" class="w-full pl-12 pr-4 py-3 bg-slate-50 rounded-xl border outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                </div>
            </div>

            <!-- Users Table -->
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                <div class="p-4 border-b flex justify-between items-center">
                    <h2 class="font-bold text-lg"><i class="fa-solid fa-users mr-2 text-slate-400"></i>Користувачі</h2>
                    <span class="text-sm text-slate-400" id="usersCount">0 юзерів</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="text-left p-4 font-bold text-slate-500">Логін</th>
                                <th class="text-center p-4 font-bold text-slate-500">Адреси</th>
                                <th class="text-center p-4 font-bold text-slate-500">Записів</th>
                                <th class="text-center p-4 font-bold text-slate-500">Останній</th>
                                <th class="text-center p-4 font-bold text-slate-500">Активний</th>
                                <th class="text-center p-4 font-bold text-slate-500">Дії</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- User Details Modal -->
    <div id="userModal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[80vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-black" id="modalUserTitle">Юзер</h3>
                <button onclick="$('userModal').classList.add('hidden')" class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 hover:bg-slate-200">✕</button>
            </div>
            <div id="modalUserContent" class="text-sm"></div>
        </div>
    </div>

    <!-- Broadcast Modal -->
    <div id="broadcastModal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
            <h3 class="text-xl font-black mb-4">📢 Оголошення</h3>
            <textarea id="broadcastMsg" rows="4" placeholder="Текст оголошення для всіх юзерів..." class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 resize-none font-medium mb-4"></textarea>
            <div class="flex gap-3">
                <button onclick="sendBroadcast()" class="flex-1 py-3 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 active:scale-95 transition-transform">Надіслати</button>
                <button onclick="$('broadcastModal').classList.add('hidden')" class="flex-1 py-3 bg-slate-100 font-bold rounded-xl hover:bg-slate-200 active:scale-95 transition-transform">Скасувати</button>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const WORKER_URL = "https://komunproga.mikolenko-anton1.workers.dev";
        let adminToken = sessionStorage.getItem('admin_token') || '';
        let allUsers = [];

        // Auto-login if token exists
        if (adminToken) { $('loginScreen').classList.add('hidden'); $('adminPanel').classList.remove('hidden'); loadStats(); }

        async function adminLogin() {
            const pass = $('adminPass').value;
            try {
                const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'admin_login', pass }) });
                const data = await res.json();
                if (data.success) {
                    adminToken = data.token;
                    sessionStorage.setItem('admin_token', adminToken);
                    $('loginScreen').classList.add('hidden');
                    $('adminPanel').classList.remove('hidden');
                    loadStats();
                } else {
                    $('loginError').textContent = 'Неправильний пароль';
                    $('loginError').classList.remove('hidden');
                }
            } catch(e) { $('loginError').textContent = 'Помилка з\'єднання'; $('loginError').classList.remove('hidden'); }
        }

        function adminLogout() { sessionStorage.removeItem('admin_token'); location.reload(); }

        async function loadStats() {
            $('lastUpdate').textContent = 'Завантаження...';
            try {
                const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'admin_stats', adminToken }) });
                const data = await res.json();
                if (!data.success) { if(data.error === 'UNAUTHORIZED') adminLogout(); return; }

                const { stats, users } = data;
                allUsers = users;

                $('statUsers').textContent = stats.totalUsers;
                $('statActive').textContent = stats.activeThisMonth;
                $('statRecords').textContent = stats.totalRecords;
                $('statRetention').textContent = stats.totalUsers > 0 ? Math.round((stats.activeThisMonth / stats.totalUsers) * 100) + '%' : '0%';
                $('usersCount').textContent = `${users.length} юзерів`;
                $('lastUpdate').textContent = `Оновлено: ${new Date().toLocaleTimeString('uk-UA')}`;

                renderUsers(users);
            } catch(e) { $('lastUpdate').textContent = 'Помилка завантаження'; }
        }

        function renderUsers(users) {
            $('usersTableBody').innerHTML = users.map(u => `
                <tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="p-4"><span class="font-bold text-slate-900">${escHtml(u.login)}</span></td>
                    <td class="p-4 text-center"><span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg font-bold text-xs">${u.addresses}</span></td>
                    <td class="p-4 text-center font-bold">${u.records}</td>
                    <td class="p-4 text-center text-slate-500">${u.lastMonth}</td>
                    <td class="p-4 text-center">${u.activeThisMonth ? '<span class="text-green-500 font-bold">●</span>' : '<span class="text-slate-300">○</span>'}</td>
                    <td class="p-4 text-center">
                        <div class="flex gap-1 justify-center">
                            <button onclick="viewUser('${escHtml(u.login)}')" class="px-3 py-1.5 bg-slate-100 rounded-lg text-xs font-bold hover:bg-slate-200" title="Переглянути">👁</button>
                            <button onclick="resetPassword('${escHtml(u.login)}')" class="px-3 py-1.5 bg-yellow-50 text-yellow-700 rounded-lg text-xs font-bold hover:bg-yellow-100" title="Скинути пароль">🔑</button>
                            <button onclick="deleteUser('${escHtml(u.login)}')" class="px-3 py-1.5 bg-red-50 text-red-500 rounded-lg text-xs font-bold hover:bg-red-100" title="Видалити">🗑</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterUsers(query) {
            const q = query.toLowerCase();
            const filtered = allUsers.filter(u => u.login.toLowerCase().includes(q));
            renderUsers(filtered);
        }

        async function viewUser(login) {
            $('modalUserTitle').textContent = login;
            $('modalUserContent').innerHTML = '<p class="text-slate-400">Завантаження...</p>';
            $('userModal').classList.remove('hidden');

            try {
                const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'admin_user_data', adminToken, login }) });
                const data = await res.json();
                if (!data.success) { $('modalUserContent').innerHTML = '<p class="text-red-500">Помилка</p>'; return; }

                const ud = data.data;
                let html = `<div class="space-y-4">`;
                html += `<div class="bg-slate-50 p-4 rounded-xl"><p class="text-xs font-bold text-slate-400 mb-1">Загальна інфо</p><p>Адрес: ${ud.addresses?.length || 0} | Створено: ${ud.createdAt || '?'} | Оновлено: ${ud.updatedAt || '?'}</p></div>`;

                if (ud.addresses) {
                    ud.addresses.forEach(addr => {
                        html += `<div class="bg-slate-50 p-4 rounded-xl"><p class="font-bold mb-2">🏠 ${addr.name}</p>`;
                        html += `<p class="text-xs text-slate-500 mb-2">Записів: ${addr.records?.length || 0}</p>`;
                        if (addr.records && addr.records.length > 0) {
                            const last3 = addr.records.sort((a,b) => b.month.localeCompare(a.month)).slice(0, 3);
                            html += `<div class="space-y-1">`;
                            last3.forEach(r => {
                                html += `<div class="flex justify-between text-xs bg-white p-2 rounded-lg"><span>${r.month}</span><span class="font-bold">${r.total?.toFixed(2) || 0} ₴</span><span class="${r.paid ? 'text-green-500' : 'text-orange-500'}">${r.paid ? '✅' : '⏳'}</span></div>`;
                            });
                            html += `</div>`;
                        }
                        html += `</div>`;
                    });
                }
                html += `</div>`;
                $('modalUserContent').innerHTML = html;
            } catch(e) { $('modalUserContent').innerHTML = '<p class="text-red-500">Помилка мережі</p>'; }
        }

        async function resetPassword(login) {
            const newPass = prompt(`Новий пароль для ${login}:`);
            if (!newPass || newPass.length < 4) return alert('Мін 4 символи');
            // Hash it
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(newPass));
            const hash = Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, '0')).join('');
            
            const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'admin_reset_password', adminToken, login, newPass: hash }) });
            const data = await res.json();
            alert(data.success ? `Пароль для ${login} змінено!` : 'Помилка');
        }

        async function deleteUser(login) {
            if (!confirm(`ВИДАЛИТИ юзера ${login}? Це незворотня дія!`)) return;
            if (!confirm(`Точно видалити ${login}???`)) return;
            const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'admin_delete_user', adminToken, login }) });
            const data = await res.json();
            if (data.success) { alert('Видалено'); loadStats(); }
            else alert('Помилка');
        }

        function openBroadcast() { $('broadcastModal').classList.remove('hidden'); }

        async function sendBroadcast() {
            const msg = $('broadcastMsg').value.trim();
            if (!msg) return;
            const res = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action: 'admin_broadcast', adminToken, message: msg }) });
            const data = await res.json();
            if (data.success) { alert('Оголошення збережено!'); $('broadcastModal').classList.add('hidden'); $('broadcastMsg').value = ''; }
        }

        function escHtml(str) { return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

        // Enter to login
        $('adminPass').addEventListener('keydown', e => { if(e.key === 'Enter') adminLogin(); });
    </script>
</body>
</html>
